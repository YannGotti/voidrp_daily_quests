# Количество квестов на игрока в день
quests-per-day: 3

# Сброс квестов (по серверному времени, 0 = полночь)
reset-hour: 0

# Награды в монетах и опыте умножаются на этот множитель
reward-multiplier: 1.0

# Сообщение при получении нового набора квестов
new-quests-message: "&6&l✦ &eНовые ежедневные квесты доступны! &6&l✦ &7Используй /dq"

# Сообщение при выполнении квеста
quest-complete-message: "&a&l✔ &aКвест выполнен: &f{quest} &a| Забери награду у квестодателя (/dq)"

# NPC имена которые открывают ежедневные квесты при нажатии
# Можно также использовать CitizensCMD: /npc command add -p dailyquest
npc-names:
  - "§6Квестодатель"

# NPC имена которые открывают задания торговца
delivery-npc-names:
  - "§5Торговец Артефактами"
